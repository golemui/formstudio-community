<svg
  class="token-meter"
  viewBox="0 0 44 44"
  [attr.aria-label]="percentage() + '% of context window used'"
>
  <title>{{ tooltipText() || percentage() + '% of context window used' }}</title>
  <!-- Background track -->
  <circle cx="22" cy="22" r="18" class="track" />
  <!-- Progress arc -->
  <circle
    cx="22"
    cy="22"
    r="18"
    class="progress"
    [style.stroke]="trackColor()"
    [style.stroke-dasharray]="circumference"
    [style.stroke-dashoffset]="dashOffset()"
  />
  <!-- Percentage label -->
  <text x="22" y="22" class="label" dominant-baseline="central" text-anchor="middle">
    {{ percentage() }}%
  </text>
</svg>
