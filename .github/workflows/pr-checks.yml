name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Formatting
        run: npm run format:check

      - name: Test
        run: npm test -- --no-watch

      - name: Build
        run: npm run build

      - name: Wrangler dry-run
        run: npx wrangler@4 deploy --dry-run
